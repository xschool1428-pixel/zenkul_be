# Render Blueprint — dev branch only (main and other branches never deploy here).
# Rename `name` below to match your existing Render Web Service name exactly.
# Secrets: set values in Render Dashboard (sync: false keeps them out of git).

services:
  - type: web
    name: zenkul_be
    runtime: docker
    branch: dev
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: off
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: AADHAAR_ENCRYPTION_KEY
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
